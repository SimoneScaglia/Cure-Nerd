<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CustomNerd</title>
    <link rel="stylesheet" type="text/css" href="contact.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <div class="toolbar">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="config.html"><i class="fas fa-cog"></i> Configuration</a>
        <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    </div>

    <!-- Custom Nerd Logo -->
    <div class="logo-container">
        <a href="index.html">
            <img src="assets/custom_nerd_default_logo.png" alt="Custom Nerd Logo" id="site-logo" style="max-width: 250px; height: auto;">
        </a>
    </div>
    <!-- <div id="ownership">
        <p>Professor Dennis Shasha @ New York University</p>
        <p>Shela Wu @ New York University</p>
        <p>Zubair Yacub @ University of Illinois Urbana Champaign</p>
    </div> -->
    <!-- Main Container -->
    <div id="container">
        <h1>Contact Us</h1>
        <p><b>We'd love to hear from you!</b></p>
        <p style="font-size: 16px;">If you'd like to tell us about your user experience or report a bug, please submit your message below.</p>
        
        <form id="contactForm">
            <div class="input-container">
                <label for="name" class="visually-hidden">Name</label>
                <input type="text" id="name" name="user_name" placeholder="Your Name" required>
            </div>
            <div class="input-container">
                <label for="email" class="visually-hidden">Email</label>
                <input type="email" id="email" name="user_email" placeholder="Your Email" required>
            </div>
            <div class="input-container">
                <label for="feedback" class="visually-hidden">Message</label>
                <textarea id="feedback" name="message" placeholder="Your Message" rows="4" required></textarea>
            </div>
            <button type="submit" id="submit">
                <i class="fas fa-paper-plane"></i>
                Submit
            </button>
        </form>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="env.js"></script>
    <script src="user_env.js"></script>
    <script src="contact.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init({
              publicKey: window.env.EMAILJS_PUBLIC_KEY,
            });
        })();
    </script>
    <script type="text/javascript">
        window.onload = function() {
            document.getElementById('contactForm').addEventListener('submit', function(event) {
                event.preventDefault();
                emailjs.sendForm(window.env.EMAILJS_SERVICE_ID, window.env.EMAILJS_TEMPLATE_ID, this)
                    .then(() => {
                        alert("Thank you for your feedback!");
                        document.getElementById("contactForm").reset();
                        console.log('SUCCESS!');
                    }, (error) => {
                        console.log('FAILED...', error);
                    });
            });
        }
    </script>
</body>
</html>
